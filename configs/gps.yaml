# GPS (Graph Transformer) hyperparameters — Phase 4
# Target: ~79% test accuracy on ogbn-arxiv (OGB leaderboard reference)
# Full-batch global attention is O(N²) on 169K nodes — mini-batching is required.

model: gps
in_channels: 128
num_classes: 40
hidden_dim: 256
num_layers: 4
num_heads: 8        # Transformer attention heads
dropout: 0.3

# Laplacian Positional Encoding
lap_pe_k: 16        # number of eigenvectors; precomputed once and cached

# Mini-batch settings (ClusterLoader)
num_parts: 32
# Attention context is per cluster. Smaller num_parts => larger cluster context.
# cluster_batch_size mainly changes throughput (multiple clusters per optimizer step),
# not per-node attention context.
cluster_batch_size: 1
cluster_recursive: false

# Optimizer
lr: 0.001
weight_decay: 0.0001
max_grad_norm: 1.0

# LR scheduler (ReduceLROnPlateau on validation accuracy)
lr_scheduler: reduce_on_plateau
lr_reduce_factor: 0.5
lr_reduce_patience: 20
lr_min: 0.00001

# Training schedule
epochs: 500
patience: 100   # early stopping on validation accuracy

# Reproducibility
seed: 42
